id: mm
builderVersion: '*'
options:
  debug: false 
  unitsCheck: true
importModule:
  type: heta
  source: src/index.heta
export:
  - format: HetaCode
    id: heta_code
  - format: SBML
    filepath: mm_sbml_l2v4
    version: L2V4
    spaceFilter: mm
  - format: SBML
    filepath: mm_sbml_l3v1
    version: L3V1
    spaceFilter: mm
  - format: Simbio
    spaceFilter: mm
  - format: JSON
    spaceFilter: mm
    useUnitsExpr: true
  - format: YAML
    spaceFilter: mm
    useUnitsExpr: true
  - format: SLV
    version: 25
    spaceFilter: mm
  - format: Julia
    spaceFilter: mm
  - format: DBSolve
    spaceFilter: mm
  - format: Mrgsolve
    spaceFilter: mm
  - format: Matlab
    spaceFilter: mm  
  - format: XLSX
    splitByClass: true
    spaceFilter: mm
  - format: Table
    spaceFilter: mm
    bookType: biff8  
  - format: Dot
  - format: Summary
  - format: MT
  - format: Canonical
  - format: DynMS
    exprFormat: math-json
